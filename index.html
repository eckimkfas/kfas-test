<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="한국고등교육재단 인재림 6기 신입생 선발 지원 시스템">
  <title>인재림 6기 | 한국고등교육재단</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <div class="navbar-brand">
        <div class="logo-icon">林</div>
        <span>인재림</span>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <div class="hero-badge">🌳 2026년 신입생 모집</div>
      <h1>인재림 제6기<br>신입생을 모집합니다</h1>
      <p>한국고등교육재단과 함께 성장할 미래의 인재를 찾습니다.<br>지금 바로 지원하세요.</p>
      <div class="hero-actions" id="hero-actions">
        <button class="btn btn-primary btn-lg" id="btn-apply" onclick="showApplicantLogin()">
          📝 지원하기
        </button>
        <button class="btn btn-secondary btn-lg" id="btn-admin" onclick="showAdminLogin()">
          🔒 관리자 로그인
        </button>
      </div>
    </div>
  </section>

  <!-- Applicant Login -->
  <div class="container" id="applicant-login" style="display:none;">
    <div class="card login-card" style="animation: fadeSlideUp 0.4s ease-out;">
      <h2>지원서 작성</h2>
      <p class="subtitle">지원 정보를 입력하고 시작하세요</p>
      <div class="form-group">
        <label class="form-label">이름 <span class="required">*</span></label>
        <input type="text" class="form-input" id="login-name" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label class="form-label">이메일 <span class="required">*</span></label>
        <input type="email" class="form-input" id="login-email" placeholder="example@email.com">
      </div>
      <div class="form-group" id="draft-notice" style="display:none;">
        <div style="padding: 12px 16px; background: var(--info-bg); border-radius: var(--radius-md); border: 1px solid var(--primary-100);">
          <p style="font-size: 0.875rem; color: var(--primary-600); font-weight: 500;">
            💾 임시 저장된 지원서가 있습니다. 이어서 작성하시겠습니까?
          </p>
        </div>
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="startApplication()">
        지원서 작성 시작
      </button>
      <button class="btn btn-ghost" style="width: 100%; margin-top: var(--space-sm);" onclick="backToHome()">
        ← 돌아가기
      </button>
    </div>
  </div>

  <!-- Admin Login -->
  <div class="container" id="admin-login" style="display:none;">
    <div class="card login-card" style="animation: fadeSlideUp 0.4s ease-out;">
      <h2>관리자 로그인</h2>
      <p class="subtitle">사업추진 1팀 관리자 전용</p>
      <div class="form-group">
        <label class="form-label">관리자 비밀번호 <span class="required">*</span></label>
        <input type="password" class="form-input" id="admin-password" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter') adminLogin()">
      </div>
      <div class="form-hint" style="margin-bottom: var(--space-lg);">
        기본 비밀번호: <code style="background: var(--neutral-100); padding: 2px 8px; border-radius: 4px; font-size: 0.8125rem;">admin2026</code>
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="adminLogin()">
        로그인
      </button>
      <button class="btn btn-ghost" style="width: 100%; margin-top: var(--space-sm);" onclick="backToHome()">
        ← 돌아가기
      </button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
